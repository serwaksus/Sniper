[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["F", "E", "W", "UP", "B", "SIM", "TCH", "RUF"]
ignore = ["E501", "E731", "SIM108"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["datetime.timedelta"]

[tool.ruff.lint.per-file-ignores]
"src/news_scanner.py" = ["RUF001"]
"src/dotm_report.py" = ["RUF001"]
"tests/test_contracts.py" = ["F403", "F405"]
"src/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "backtest_v2.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "stress_test"
ignore_errors = true
